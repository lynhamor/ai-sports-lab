db:
  username: root
  password: root
  host: localhost
  port: 3307
spring:
  application:
    name: simulation app
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.1
  datasource:
    core:
      hikari:
        driver-class-name: org.mariadb.jdbc.Driver
        jdbc-url: jdbc:mariadb://${db.host}:${db.port}/core
        username: ${db.username}
        password: ${db.password}
        connection-timeout: 30000
        idle-timeout: 20000
        max-lifetime: 25000
        minimum-idle: 10
        maximum-pool-size: 20
        leak-detection-threshold: 10000
        validation-timeout: 5000
        connection-test-query: SELECT 1
    nba:
      hikari:
        driver-class-name: org.mariadb.jdbc.Driver
        jdbc-url: jdbc:mariadb://${db.host}:${db.port}/game_nba
        username: ${db.username}
        password: ${db.password}
        connection-timeout: 30000
        idle-timeout: 20000
        max-lifetime: 25000
        minimum-idle: 10
        maximum-pool-size: 20
        leak-detection-threshold: 10000
        validation-timeout: 5000
        connection-test-query: SELECT 1
    jpa:
      show-sql: false
      properties:
        hibernate:
          order_inserts: true
          order_updates: true
          jdbc:
            batch_size: 1000
            fetch_size: 1000
            batch_versioned_data: true
          ddl-auto: none
          dialect: org.hibernate.dialect.MariaDBDialect
          naming:
            physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server:
  port: 8081

springdoc:
  swagger-ui:
    path: /api-docs
    disable-swagger-default-url: true
  api-docs:
    path: /api-doc

# check AOP LOG
logging:
  level:
    org.springframework.transaction: TRACE
    org.springframework.transaction.interceptor: TRACE
    org.springframework.aop: DEBUG
